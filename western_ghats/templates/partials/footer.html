<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Footer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    footer {
      background-color: #3a4a2e;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-left svg {
      flex-shrink: 0;
    }

    .footer-left span {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12.5px;
      letter-spacing: 0.01em;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .footer-right a {
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .footer-right a:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    @media (max-width: 600px) {
      footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>

  <footer>
    <!-- Left: Copyright -->
    <div class="footer-left">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
        <path d="M12 6v6l4 2" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>2009 &nbsp; Western-Ghats Biodiversity Panel &nbsp;&nbsp;|&nbsp;&nbsp; All Rights Reserved</span>
    </div>

    <!-- Right: Social Icons -->

  </footer>

</body>
</html>
